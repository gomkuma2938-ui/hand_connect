<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>손잇기 기도</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/pinch-zoom-js/dist/pinch-zoom.umd.js"></script>
</head>
<body>
  <header>
    <img src="img/title.jpg" alt="손잇기 기도" style="width:100%;">
    <div class="intro-text">
      <h2>손잇기 기도</h2>
      <p>이곳에 마음을 머물게 하는 안온한 문구를 적어주세요.</p>
    </div>
  </header>

  <main id="gallery-container"></main>

  <section id="comment-section">
    <div id="comment-form">
      <textarea id="comment-input" placeholder="따뜻한 한마디를 남겨주세요."></textarea>
      <div id="error-message"></div>
      <div class="form-bottom">
        <input type="password" id="pw-input" placeholder="비밀번호(4자 이상)">
        <!-- 아래 버튼 코드에 onclick="submitComment()"가 반드시 포함되어야 합니다 -->
        <button id="submit-btn" onclick="submitComment()">등록</button>
      </div>
    </div>
    <div id="comment-list"></div>
    <div id="pagination"></div>
  </section>

  <div id="image-modal" class="modal">
    <span class="close-btn">&times;</span>
    <div class="zoom-container">
      <img id="modal-img" src="">
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
