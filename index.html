<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>손잇기 기도</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/pinch-zoom-js/dist/pinch-zoom.umd.js"></script>
</head>
<body>
  <header>
    <img src="img/title.png" alt="손잇기 기도" style="width:100%;">
    <div class="intro-text">
      <h2>누군가 당신을 위해 기도합니다</h2>
      <p>내가 홀로 외로워서 마음이 무너질 때 누군가 널 위해 기도하네</p>
    </div>
  </header>

<main id="gallery-container"></main>
  
  <!-- 댓글 섹션 시작 -->
  <section id="comment-section">
    <!-- 1. 소제목 삽입: 등록 영역 위로 이동 및 중앙 정렬 -->
    <h3 class="comments-title" style="text-align: center; margin-bottom: 20px;">기도 동참하기🙏</h3>

    <div id="comment-form">
      <!-- 내용 입력 필드 -->
      <textarea id="comment-input" placeholder="따뜻한 한마디를 남겨주세요."></textarea>
      
      <!-- 비번 필드와 등록 버튼 -->
      <div class="form-bottom">
        <input type="password" id="pw-input" placeholder="비밀번호(4자 이상)">
        <button id="submit-btn" onclick="submitComment()">등록</button>
      </div>

      <!-- ❗ 에러 문구를 가장 하단으로 이동 -->
      <div id="error-message" class="error-msg" style="text-align:center; display:none;"></div>
    </div>

    <div id="comment-list"></div>
    <div id="pagination"></div>
  </section>

  <div id="image-modal" class="modal">
    <span class="close-btn">&times;</span>
    <div class="zoom-container">
      <img id="modal-img" src="">
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
