<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>손잇기 기도</title>
  <link rel="stylesheet" href="style.css">
  <!-- 핀치줌 라이브러리 -->
  <script src="https://unpkg.com/pinch-zoom-js/dist/pinch-zoom.umd.js"></script>
</head>
<body>
  <header>
    <img src="img/title.png" alt="손잇기 기도" style="width:100%;">
    <div class="intro-text">
      <h2>"누군가 당신을 위해 기도합니다"<br>
      내가 홀로 외로워서 마음이 무너질 때<br>
      누군가 널 위해 기도하네</h2>
    </div>
  </header>

  <main id="gallery-container"></main>
  
  <section id="comment-section">
    <h3 class="comments-title">기도 동참하기🙏</h3>
    <p class="comments-info">서로를 위해 함께 기도해 주세요</p>
    
    <div id="comment-form">
      <textarea id="comment-input" placeholder="기도글을 남겨주세요."></textarea>
      
      <div class="form-bottom">
        <input type="password" id="pw-input" placeholder="비밀번호(4자 이상)">
        <button id="submit-btn" onclick="submitComment()">등록</button>
      </div>

      <div id="error-message" class="error-msg" style="text-align:center; display:none;"></div>
    </div>

    <div id="comment-list"></div>
    <div id="pagination"></div>
    
  
  </section>

  <div id="image-modal" class="modal">
    <span class="close-btn">&times;</span>
    <div class="zoom-container">
      <img id="modal-img" src="">
    </div>
  </div>

  <!-- 자바스크립트 파일 연결 (경로 확인 필수: js 폴더 안의 main.js) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
